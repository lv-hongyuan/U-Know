services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - ./api/.env
    environment:
      HOST: 0.0.0.0
    restart: unless-stopped
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - api
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
